services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - uploads/
            - database.db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    # Removed local bind mount because 'watch' handles sync
    # volumes:
    #   - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json

  landing:
    build: ./landing
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./landing
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./landing/package.json